<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>$LIBD | LIBERATION DAY</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{
    --red:#CC0000;
    --blue:#002868;
    --gold:#FFD700;
    --dark:#0a0a0a;
  }
  body{
    background:var(--dark);
    color:white;
    font-family:'Inter',sans-serif;
    overflow-x:hidden;
  }
  .stripes{height:14px;background:repeating-linear-gradient(90deg,var(--red) 0px,var(--red) 16px,white 16px,white 32px);z-index:2;}
  
  .hero{
    position:relative;
    text-align:center;
    padding:80px 20px 60px;
    background:linear-gradient(135deg, #1a0000 0%, #000c1a 100%);
    overflow:hidden;
  }
  .hero::before{
    content:'';
    position:absolute;
    top:0; left:0; right:0; bottom:0;
    background:radial-gradient(circle at center, rgba(255,215,0,0.15) 0%, transparent 70%);
    z-index:0;
  }
  
  .logo{
    width:200px; height:200px; border-radius:50%;
    border:8px solid var(--gold);
    box-shadow:0 0 60px rgba(255,215,0,0.6);
    margin:0 auto 24px;
    display:block;
    z-index:1;
    position:relative;
  }
  
  .title{
    font-family:'Bebas Neue',sans-serif;
    font-size:clamp(68px,12vw,120px);
    letter-spacing:6px;
    line-height:0.85;
    background:linear-gradient(180deg, #FFD700 0%, #FFAA00 50%, #FFD700 100%);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    margin-bottom:8px;
  }
  
  .subtitle{
    font-family:'Bebas Neue',sans-serif;
    font-size:clamp(22px,4vw,32px);
    letter-spacing:8px;
    color:#ddd;
    margin-bottom:20px;
  }
  
  .badge{
    display:inline-block;
    background:var(--red);
    color:white;
    font-family:'Bebas Neue',sans-serif;
    padding:10px 32px;
    font-size:18px;
    letter-spacing:4px;
    border-radius:4px;
    animation:pulse 2s infinite;
  }
  
  @keyframes pulse{0%,100%{transform:scale(1)} 50%{transform:scale(1.08)}}
  
  .ticker{
    background:var(--red);
    padding:12px 0;
    overflow:hidden;
    font-family:'Bebas Neue',sans-serif;
    font-size:19px;
    letter-spacing:3px;
  }
  .ticker-inner{
    display:flex;
    white-space:nowrap;
    animation:scroll 20s linear infinite;
    gap:60px;
  }
  @keyframes scroll{from{transform:translateX(0)} to{transform:translateX(-50%)}}
  
  .buy-section{
    text-align:center;
    padding:60px 20px;
    background:linear-gradient(180deg, transparent, #1a0000);
  }
  .buy-btn{
    display:inline-block;
    background:linear-gradient(135deg, var(--red), #880000);
    color:white;
    font-family:'Bebas Neue',sans-serif;
    font-size:28px;
    letter-spacing:6px;
    padding:22px 68px;
    border-radius:6px;
    box-shadow:0 0 40px rgba(204,0,0,0.7);
    animation:glow 2s infinite;
    text-decoration:none;
  }
  @keyframes glow{0%,100%{box-shadow:0 0 40px rgba(204,0,0,0.7)} 50%{box-shadow:0 0 70px rgba(204,0,0,0.9)}}
  
  .ca-box{
    margin-top:24px;
    background:rgba(255,255,255,0.08);
    padding:16px 28px;
    border-radius:6px;
    font-size:15px;
    letter-spacing:2px;
    border:1px solid rgba(255,215,0,0.3);
  }
</style>
</head>
<body>

<div class="stripes"></div>

<div class="hero">
  <img src="https://你的头像直链.png" alt="$LIBD" class="logo">
  <div class="title">LIBERATION</div>
  <div class="subtitle">$LIBD · ONE YEAR ANNIVERSARY</div>
  <div class="badge">APRIL 2, 2025 — 2026 · ON SOLANA 🦅</div>
</div>

<div class="ticker">
  <div class="ticker-inner">
    <span>LIBERATION DAY DECLARED ★ APRIL 2 2025 ★ GLOBAL CHAOS ★ SUPREME COURT RULING ★ ONE YEAR LATER ★ $LIBD ON PUMP.FUN ★ ECONOMIC WARFARE ★ LEGEND ON-CHAIN ★ REPEAT</span>
  </div>
</div>

<div class="buy-section">
  <a href="https://pump.fun" target="_blank" class="buy-btn">BUY $LIBD ON PUMP.FUN</a>
  <div class="ca-box">合约地址: TBA — 发币后立即更新</div>
</div>

<div class="stripes"></div>

</body>
</html>
